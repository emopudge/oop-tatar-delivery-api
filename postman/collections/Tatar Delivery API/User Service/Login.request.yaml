$kind: http-request
method: POST
url: '{{userServiceUrl}}/users/login'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "demo.qa@example.com",
      "password": "Password123!"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      if (pm.response.code === 200) {
        const json = pm.response.json();
        pm.environment.set('token', json.accessToken);
        pm.environment.set('userId', json.user.id);
      }
