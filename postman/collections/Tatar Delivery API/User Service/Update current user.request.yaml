$kind: http-request
method: PUT
url: '{{userServiceUrl}}/users/me'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "fullName": "Updated Demo User",
      "phone": "+79991111111"
    }
